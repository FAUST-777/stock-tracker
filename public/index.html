<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>Stock Tracker · VOO VTI QQQ</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
:root {
  --bg:      #0a0b0f;
  --panel:   #111318;
  --card:    #13161e;
  --border:  #00d4aa;
  --border2: #1c2230;
  --text:    #e8eaf0;
  --muted:   #5a6478;
  --green:   #00d4aa;
  --red:     #ff4d6d;
  --gold:    #f5a623;
  --blue:    #3b82f6;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Top bar ── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px;
  border-bottom: 1px solid var(--border2);
  flex-shrink: 0;
}
.topbar-title { font-size: 1rem; font-weight: 700; color: var(--green); letter-spacing: 1px; }
.topbar-right { display: flex; align-items: center; gap: 10px; font-size: .75rem; color: var(--muted); }
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
.dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); }

/* ── Main layout ── */
.layout {
  flex: 1;
  display: flex;
  gap: 0;
  overflow: hidden;
  padding: 16px;
  gap: 16px;
}

/* ── LEFT PANEL ── */
.left-panel {
  width: 340px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 10px;
  overflow-y: auto;
}

.stock-card {
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 14px 16px;
  cursor: pointer;
  transition: border-color .2s;
  position: relative;
}
.stock-card:hover  { border-color: var(--border); }
.stock-card.active { border-color: var(--border); box-shadow: 0 0 0 1px var(--border); }

.card-row1 {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 4px;
}
.card-sym  { font-size: 1.3rem; font-weight: 900; letter-spacing: 1px; }
.card-name { font-size: .65rem; color: var(--muted); margin-bottom: 6px; }
.card-price-row { display: flex; align-items: baseline; gap: 8px; }
.card-price { font-size: 1.6rem; font-weight: 800; font-variant-numeric: tabular-nums; }
.card-change { font-size: .85rem; font-weight: 700; }
.up   { color: var(--green); }
.down { color: var(--red); }
.card-meta {
  display: flex; gap: 12px;
  font-size: .65rem; color: var(--muted);
  margin-top: 5px;
}
.card-meta span b { color: #8899aa; font-weight: 600; }
.card-spark { height: 48px; margin-top: 8px; }
.market-tag {
  font-size: .6rem; font-weight: 700;
  padding: 2px 7px; border-radius: 20px;
}
.tag-REGULAR { background:#0a2e1e; color:var(--green); }
.tag-PRE     { background:#0d1f3c; color:#93c5fd; }
.tag-POST    { background:#1e0f35; color:#c4b5fd; }
.tag-CLOSED  { background:#1a1e2a; color:var(--muted); }

/* Alert pill on card */
.card-alerts {
  display: flex; gap: 6px;
  margin-top: 8px;
}
.alert-chip {
  flex: 1; font-size: .62rem; font-weight: 600;
  padding: 3px 7px; border-radius: 6px;
  background: #0f1219; border: 1px solid var(--border2);
  color: var(--muted);
}
.alert-chip.set-h { border-color: #0d3320; color: var(--green); }
.alert-chip.set-l { border-color: #3a0d1a; color: var(--red); }

/* ── Alert settings (bottom of left panel) ── */
.alert-panel {
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 14px 16px;
  margin-top: 4px;
}
.alert-panel h3 {
  font-size: .82rem; font-weight: 700;
  color: var(--gold); margin-bottom: 12px;
}
.alert-sym-label {
  font-size: .75rem; font-weight: 700;
  color: var(--text); margin-bottom: 6px;
}
.alert-inputs { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
.ai-row { display: flex; align-items: center; gap: 6px; }
.ai-row label { font-size: .65rem; color: var(--muted); width: 52px; }
.ai-row input {
  flex: 1; background: #0f1219;
  border: 1px solid var(--border2);
  border-radius: 6px; color: var(--text);
  font-size: .8rem; padding: 5px 8px; outline: none;
}
.ai-row input:focus { border-color: var(--border); }
.alert-sym-tabs { display: flex; gap: 6px; margin-bottom: 10px; }
.asym-tab {
  flex: 1; background: #0f1219;
  border: 1px solid var(--border2);
  border-radius: 6px; color: var(--muted);
  font-size: .75rem; font-weight: 700;
  padding: 5px; cursor: pointer; text-align: center;
}
.asym-tab.active { background: #0a2520; border-color: var(--border); color: var(--green); }
.btn-save-alert {
  width: 100%; background: var(--border);
  border: none; border-radius: 7px;
  color: #000; font-size: .78rem; font-weight: 800;
  padding: 7px; cursor: pointer; margin-bottom: 5px;
}
.btn-save-alert:hover { opacity: .85; }
.btn-clear-alert {
  width: 100%; background: transparent;
  border: 1px solid var(--border2);
  border-radius: 7px; color: var(--muted);
  font-size: .72rem; padding: 5px; cursor: pointer;
}
.btn-clear-alert:hover { color: var(--red); border-color: var(--red); }

/* ── RIGHT PANEL ── */
.right-panel {
  flex: 1;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 14px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding: 20px;
}
.chart-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 12px;
  flex-shrink: 0;
}
.chart-sym-big  { font-size: 1.6rem; font-weight: 900; letter-spacing: 1px; }
.chart-price-big { font-size: 2.2rem; font-weight: 800; margin-top: 2px; }
.chart-change-big { font-size: 1rem; font-weight: 700; margin-top: 2px; }
.period-tabs { display: flex; gap: 6px; }
.ptab {
  background: transparent; border: 1px solid var(--border2);
  border-radius: 7px; color: var(--muted);
  font-size: .75rem; font-weight: 700;
  padding: 5px 14px; cursor: pointer;
}
.ptab.active, .ptab:hover {
  background: var(--border); border-color: var(--border); color: #000;
}
.chart-wrap { flex: 1; min-height: 0; position: relative; }
#main-chart { width: 100% !important; height: 100% !important; }

/* ── Alert OVERLAY ── */
#alert-overlay {
  display: none; position: fixed; inset: 0; z-index: 9999;
  background: rgba(0,0,0,.88);
  align-items: center; justify-content: center;
}
#alert-overlay.show { display: flex; }
.alert-box {
  background: #0b0d12;
  border: 3px solid var(--gold);
  border-radius: 20px; padding: 36px 52px;
  text-align: center;
  animation: pulse-box 1.2s ease-in-out infinite alternate;
}
@keyframes pulse-box {
  from { box-shadow: 0 0 30px rgba(245,166,35,.3); }
  to   { box-shadow: 0 0 80px rgba(245,166,35,.8); }
}
.ao-icon  { font-size: 3rem; }
.ao-sym   { font-size: 2.5rem; font-weight: 900; color: var(--gold); margin: 6px 0; }
.ao-dir   { font-size: 1rem; color: var(--muted); }
.ao-price { font-size: 2.8rem; font-weight: 900; margin: 10px 0 4px 0; }
.ao-tgt   { font-size: .85rem; color: var(--muted); margin-bottom: 24px; }
.btn-ok   {
  background: var(--gold); border: none; border-radius: 10px;
  color: #000; font-size: .95rem; font-weight: 900;
  padding: 11px 36px; cursor: pointer;
}
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div class="topbar-title">📈 STOCK TRACKER</div>
  <div class="topbar-right">
    <div class="dot" id="conn-dot"></div>
    <span id="conn-txt">連線中...</span>
    <span id="last-ts" style="margin-left:8px">--</span>
  </div>
</div>

<!-- Main layout -->
<div class="layout">

  <!-- LEFT: stock list + alert settings -->
  <div class="left-panel">
    <div id="stock-list"></div>

    <div class="alert-panel">
      <h3>🔔 價格警報</h3>
      <div class="alert-sym-tabs" id="alert-sym-tabs"></div>
      <div class="alert-inputs">
        <div class="ai-row">
          <label>🔺 突破</label>
          <input type="number" id="inp-high" placeholder="高點價格" step="0.01">
        </div>
        <div class="ai-row">
          <label>🔻 跌破</label>
          <input type="number" id="inp-low"  placeholder="低點價格" step="0.01">
        </div>
      </div>
      <button class="btn-save-alert"  onclick="saveAlert()">💾 儲存警報</button>
      <button class="btn-clear-alert" onclick="clearAlert()">✖ 清除警報</button>
    </div>
  </div>

  <!-- RIGHT: big chart -->
  <div class="right-panel">
    <div class="chart-top">
      <div>
        <div class="chart-sym-big"  id="ct-sym">--</div>
        <div class="chart-price-big" id="ct-price">--</div>
        <div class="chart-change-big" id="ct-change">--</div>
      </div>
      <div class="period-tabs">
        <button class="ptab active" onclick="setPeriod('1d',this)">今日</button>
        <button class="ptab" onclick="setPeriod('5d',this)">5日</button>
        <button class="ptab" onclick="setPeriod('1mo',this)">1月</button>
        <button class="ptab" onclick="setPeriod('3mo',this)">3月</button>
      </div>
    </div>
    <div class="chart-wrap">
      <canvas id="main-chart"></canvas>
    </div>
  </div>
</div>

<!-- Alert overlay -->
<div id="alert-overlay">
  <div class="alert-box">
    <div class="ao-icon" id="ao-icon">🚨</div>
    <div class="ao-sym"  id="ao-sym">---</div>
    <div class="ao-dir"  id="ao-dir">---</div>
    <div class="ao-price up" id="ao-price">$0.00</div>
    <div class="ao-tgt"  id="ao-tgt">目標 $0.00</div>
    <button class="btn-ok" onclick="dismissAlert()">✅ 確認</button>
  </div>
</div>

<script>
const SYMBOLS = ['VOO','VTI','QQQ'];
let quotes  = {};
let alerts  = {};
let selSym  = SYMBOLS[0];
let selPeriod = '1d';
let mainChart = null;
const sparkData = {}; // symbol → array of close prices for sparkline
const sparkCharts = {};

// ── WebSocket ─────────────────────────────────────────────────────────────────
function connect() {
  const ws = new WebSocket(`ws://${location.host}`);
  ws.onopen = () => {
    document.getElementById('conn-dot').classList.add('live');
    document.getElementById('conn-txt').textContent = '已連線';
  };
  ws.onmessage = ({ data }) => {
    const msg = JSON.parse(data);
    if (msg.type === 'update') {
      const prev = { ...quotes };
      quotes = msg.quotes;
      alerts = msg.alerts || {};
      renderStockList(prev);
      updateChartHeader();
      updateAlertPanel();
      document.getElementById('last-ts').textContent =
        new Date(msg.ts).toLocaleTimeString('zh-TW');
      if (msg.triggered?.length) showOverlay(msg.triggered[0]);
    }
    if (msg.type === 'alerts') { alerts = msg.alerts || {}; renderStockList(); updateAlertPanel(); }
  };
  ws.onclose = () => {
    document.getElementById('conn-dot').classList.remove('live');
    document.getElementById('conn-txt').textContent = '重連中...';
    setTimeout(connect, 3000);
  };
}
connect();

// ── Stock list ────────────────────────────────────────────────────────────────
function renderStockList(prev = {}) {
  const container = document.getElementById('stock-list');
  SYMBOLS.forEach(sym => {
    const q = quotes[sym]; if (!q) return;
    const up   = q.change >= 0;
    const cls  = up ? 'up' : 'down';
    const arrow = up ? '▲' : '▼';
    const pct  = Math.abs(q.changePct).toFixed(2);
    const chg  = (up?'+':'') + q.change.toFixed(2);
    const a    = alerts[sym] || {};

    let el = document.getElementById(`sc-${sym}`);
    if (!el) {
      el = document.createElement('div');
      el.id = `sc-${sym}`;
      el.className = 'stock-card' + (sym === selSym ? ' active' : '');
      el.onclick = () => selectSym(sym);
      container.appendChild(el);
    }

    el.className = 'stock-card' + (sym === selSym ? ' active' : '');
    el.innerHTML = `
      <div class="card-row1">
        <span class="card-sym">${sym}</span>
        <span class="market-tag tag-${q.marketState}">${mktLabel(q.marketState)}</span>
      </div>
      <div class="card-name">${q.name}</div>
      <div class="card-price-row">
        <span class="card-price ${cls}">$${q.price.toFixed(2)}</span>
        <span class="card-change ${cls}">${arrow} ${chg} (${pct}%)</span>
      </div>
      <div class="card-meta">
        <span>開 <b>$${q.open.toFixed(2)}</b></span>
        <span>高 <b>$${q.high.toFixed(2)}</b></span>
        <span>低 <b>$${q.low.toFixed(2)}</b></span>
      </div>
      <canvas class="card-spark" id="spark-${sym}"></canvas>
      <div class="card-alerts">
        <div class="alert-chip ${a.high?'set-h':''}">🔺 ${a.high ? '$'+parseFloat(a.high).toFixed(2) : '未設定'}</div>
        <div class="alert-chip ${a.low?'set-l':''}">🔻 ${a.low  ? '$'+parseFloat(a.low).toFixed(2)  : '未設定'}</div>
      </div>`;

    // re-draw sparkline (canvas recreated)
    drawSpark(sym, up);
  });
}

function mktLabel(s) {
  return {REGULAR:'開盤中', PRE:'盤前', POST:'盤後', CLOSED:'已收盤'}[s] ?? s;
}

// ── Sparklines ────────────────────────────────────────────────────────────────
async function loadSparks() {
  for (const sym of SYMBOLS) {
    try {
      const res  = await fetch(`/api/chart/${sym}/1d`);
      const data = await res.json();
      sparkData[sym] = data.map(d => d.c).filter(Boolean);
    } catch {}
  }
  renderStockList({});
}

function drawSpark(sym, up) {
  const canvas = document.getElementById(`spark-${sym}`);
  if (!canvas) return;
  const pts = sparkData[sym];
  if (!pts || pts.length < 2) return;

  if (sparkCharts[sym]) { sparkCharts[sym].destroy(); }
  const color = up ? '#00d4aa' : '#ff4d6d';
  sparkCharts[sym] = new Chart(canvas, {
    type: 'line',
    data: {
      labels: pts.map((_,i) => i),
      datasets: [{ data: pts, borderColor: color, borderWidth: 1.5,
        fill: true,
        backgroundColor: up ? 'rgba(0,212,170,.08)' : 'rgba(255,77,109,.08)',
        pointRadius: 0, tension: 0.3 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, animation: false,
      plugins: { legend:{display:false}, tooltip:{enabled:false} },
      scales: { x:{display:false}, y:{display:false} },
    }
  });
}

// ── Symbol select ─────────────────────────────────────────────────────────────
function selectSym(sym) {
  selSym = sym;
  renderStockList({});
  updateChartHeader();
  loadMainChart();
  updateAlertPanel();
}

// ── Big chart ─────────────────────────────────────────────────────────────────
function updateChartHeader() {
  const q = quotes[selSym]; if (!q) return;
  const up = q.change >= 0;
  document.getElementById('ct-sym').textContent   = selSym;
  document.getElementById('ct-price').textContent = `$${q.price.toFixed(2)}`;
  const ct = document.getElementById('ct-change');
  ct.textContent = `${up?'▲':'▼'} ${(up?'+':'')}${q.change.toFixed(2)} (${Math.abs(q.changePct).toFixed(2)}%)`;
  ct.className   = `chart-change-big ${up?'up':'down'}`;
}

async function loadMainChart() {
  try {
    const res  = await fetch(`/api/chart/${selSym}/${selPeriod}`);
    const data = await res.json();
    if (!data.length) return;

    const labels = data.map(d => {
      const dt = new Date(d.t);
      return (selPeriod === '1d' || selPeriod === '5d')
        ? dt.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'})
        : dt.toLocaleDateString('zh-TW',{month:'short',day:'numeric'});
    });
    const prices = data.map(d => d.c);
    const q   = quotes[selSym];
    const up  = q ? q.change >= 0 : prices[prices.length-1] >= prices[0];
    const col = up ? '#00d4aa' : '#ff4d6d';

    if (mainChart) mainChart.destroy();
    const ctx = document.getElementById('main-chart').getContext('2d');
    const grad = ctx.createLinearGradient(0, 0, 0, ctx.canvas.offsetHeight);
    grad.addColorStop(0, up ? 'rgba(0,212,170,.18)' : 'rgba(255,77,109,.18)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');

    mainChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [{ label: selSym, data: prices,
          borderColor: col, borderWidth: 2,
          backgroundColor: grad, fill: true,
          pointRadius: 0, tension: 0.3 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false, animation: false,
        interaction: { intersect: false, mode: 'index' },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#1a1e2a',
            borderColor: '#2a3040', borderWidth: 1,
            callbacks: { label: c => ` $${c.parsed.y.toFixed(2)}` }
          },
        },
        scales: {
          x: { grid:{color:'#1a1e2a'}, ticks:{color:'#5a6478', maxTicksLimit:8, font:{size:11}} },
          y: { grid:{color:'#1a1e2a'}, ticks:{color:'#5a6478', callback: v=>'$'+v.toFixed(0), font:{size:11}},
               position:'right' },
        },
      }
    });
  } catch (e) { console.error('chart load error', e); }
}

function setPeriod(p, btn) {
  selPeriod = p;
  document.querySelectorAll('.ptab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  loadMainChart();
}

// ── Alert panel ───────────────────────────────────────────────────────────────
let alertSym = SYMBOLS[0];

function buildAlertSymTabs() {
  const div = document.getElementById('alert-sym-tabs');
  div.innerHTML = SYMBOLS.map(s =>
    `<div class="asym-tab ${s===alertSym?'active':''}" onclick="switchAlertSym('${s}')">${s}</div>`
  ).join('');
}

function switchAlertSym(sym) {
  alertSym = sym;
  buildAlertSymTabs();
  updateAlertPanel();
}

function updateAlertPanel() {
  buildAlertSymTabs();
  const a = alerts[alertSym] || {};
  document.getElementById('inp-high').value = a.high ?? '';
  document.getElementById('inp-low').value  = a.low  ?? '';
}

function saveAlert() {
  const high = document.getElementById('inp-high').value.trim();
  const low  = document.getElementById('inp-low').value.trim();
  fetch('/api/alerts', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ symbol: alertSym, high: high||null, low: low||null }),
  });
}

function clearAlert() {
  document.getElementById('inp-high').value = '';
  document.getElementById('inp-low').value  = '';
  fetch('/api/alerts', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ symbol: alertSym, high: null, low: null }),
  });
}

// ── Overlay ───────────────────────────────────────────────────────────────────
function showOverlay(alert) {
  const up = alert.type === 'high';
  document.getElementById('ao-icon').textContent  = up ? '📈' : '📉';
  document.getElementById('ao-sym').textContent   = alert.symbol;
  document.getElementById('ao-dir').textContent   = up ? '已突破高點警報' : '已跌破低點警報';
  document.getElementById('ao-price').textContent = `$${parseFloat(alert.price).toFixed(2)}`;
  document.getElementById('ao-price').className   = `ao-price ${up?'up':'down'}`;
  document.getElementById('ao-tgt').textContent   = `目標價 $${parseFloat(alert.target).toFixed(2)}`;
  document.getElementById('alert-overlay').classList.add('show');
  playBeep(up);
}
function dismissAlert() {
  document.getElementById('alert-overlay').classList.remove('show');
}
function playBeep(up) {
  try {
    const ac = new AudioContext();
    [up?880:440, up?1100:330].forEach((f,i) => {
      const o=ac.createOscillator(), g=ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.frequency.value=f; o.type='square';
      g.gain.setValueAtTime(.2, ac.currentTime+i*.2);
      g.gain.exponentialRampToValueAtTime(.001, ac.currentTime+i*.2+.18);
      o.start(ac.currentTime+i*.2); o.stop(ac.currentTime+i*.2+.2);
    });
  } catch {}
}

// ── Init ──────────────────────────────────────────────────────────────────────
buildAlertSymTabs();
loadSparks().then(() => {
  updateChartHeader();
  loadMainChart();
});
</script>
</body>
</html>
