<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>Stock Tracker · VOO VTI QQQ</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
:root {
  --bg:     #0a0b0f;
  --panel:  #111318;
  --card:   #13161e;
  --border: #00d4aa;
  --dim:    #1c2230;
  --text:   #e8eaf0;
  --muted:  #5a6478;
  --green:  #00d4aa;
  --red:    #ff4d6d;
  --gold:   #f5a623;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Segoe UI',system-ui,sans-serif;
  background:var(--bg);color:var(--text);
  height:100vh;display:flex;flex-direction:column;
}

/* topbar */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 18px;border-bottom:1px solid var(--dim);flex-shrink:0;
}
.topbar-logo{font-size:.9rem;font-weight:800;color:var(--green);letter-spacing:1.5px}
.topbar-right{display:flex;align-items:center;gap:8px;font-size:.72rem;color:var(--muted)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--muted)}
.dot.live{background:var(--green);box-shadow:0 0 5px var(--green)}

/* layout */
.layout{flex:1;display:flex;gap:14px;padding:14px;overflow:hidden;min-height:0}

/* ── LEFT ── */
.left{
  width:260px;flex-shrink:0;
  display:flex;flex-direction:column;gap:8px;
  overflow-y:auto;
}

/* compact stock row */
.srow{
  background:var(--card);
  border:1px solid var(--dim);
  border-radius:10px;
  padding:10px 12px;
  cursor:pointer;
  transition:border-color .15s;
  /* NO canvas, fixed content */
}
.srow:hover{border-color:rgba(0,212,170,.4)}
.srow.active{border-color:var(--border);box-shadow:0 0 0 1px var(--border)}

.srow-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.srow-sym{font-size:1.05rem;font-weight:900;letter-spacing:.5px;width:38px}
.srow-price{font-size:1rem;font-weight:800;font-variant-numeric:tabular-nums}
.srow-chg{font-size:.72rem;font-weight:700;text-align:right;flex:1}
.up{color:var(--green)} .down{color:var(--red)}

.mkt-tag{
  font-size:.55rem;font-weight:700;padding:2px 6px;border-radius:10px;
  flex-shrink:0;
}
.tag-REGULAR{background:#0a2e1e;color:var(--green)}
.tag-PRE    {background:#0d1f3c;color:#93c5fd}
.tag-POST   {background:#1e0f35;color:#c4b5fd}
.tag-CLOSED {background:#1a1e2a;color:var(--muted)}

/* alert inputs inside card */
.srow-alerts{
  display:flex;gap:6px;margin-top:8px;
}
.ai{display:flex;align-items:center;gap:4px;flex:1}
.ai label{font-size:.6rem;color:var(--muted);white-space:nowrap}
.ai input{
  flex:1;background:#0a0c10;
  border:1px solid var(--dim);border-radius:5px;
  color:var(--text);font-size:.72rem;
  padding:4px 6px;outline:none;width:0;min-width:0;
}
.ai input:focus{border-color:var(--border)}
.srow-btns{display:flex;gap:5px;margin-top:6px}
.btn-s{
  flex:1;border:none;border-radius:6px;
  font-size:.68rem;font-weight:700;padding:5px;cursor:pointer;
}
.btn-save{background:var(--border);color:#000}
.btn-save:hover{opacity:.85}
.btn-clr{background:#1a1e2a;color:var(--muted);border:1px solid var(--dim)}
.btn-clr:hover{color:var(--red);border-color:var(--red)}

/* alert chip shown when set */
.alert-chip-row{display:flex;gap:5px;margin-top:6px}
.achip{
  flex:1;font-size:.6rem;padding:2px 6px;border-radius:5px;
  background:#0a0c10;border:1px solid var(--dim);color:var(--muted);
  text-align:center;
}
.achip.h-set{border-color:#0d3320;color:var(--green)}
.achip.l-set{border-color:#3a0d1a;color:var(--red)}

/* ── RIGHT ── */
.right{
  flex:1;background:var(--panel);
  border:1.5px solid var(--border);border-radius:14px;
  display:flex;flex-direction:column;
  overflow:hidden;padding:18px 20px;min-width:0;
}
.chart-hdr{
  display:flex;align-items:flex-start;
  justify-content:space-between;
  flex-shrink:0;margin-bottom:10px;
}
.ch-left .ch-sym  {font-size:1.4rem;font-weight:900;letter-spacing:1px}
.ch-left .ch-price{font-size:2rem;font-weight:800;margin-top:2px}
.ch-left .ch-chg  {font-size:.9rem;font-weight:700;margin-top:2px}
.period-tabs{display:flex;gap:6px}
.ptab{
  background:transparent;border:1px solid var(--dim);
  border-radius:7px;color:var(--muted);
  font-size:.72rem;font-weight:700;padding:5px 14px;cursor:pointer;
}
.ptab.active,.ptab:hover{background:var(--border);border-color:var(--border);color:#000}
.chart-wrap{flex:1;min-height:0;position:relative}
#main-chart{width:100%!important;height:100%!important}

/* overlay */
#overlay{
  display:none;position:fixed;inset:0;z-index:9999;
  background:rgba(0,0,0,.88);align-items:center;justify-content:center;
}
#overlay.show{display:flex}
.obox{
  background:#0b0d12;border:3px solid var(--gold);
  border-radius:20px;padding:36px 52px;text-align:center;
  animation:pulse 1.2s ease-in-out infinite alternate;
}
@keyframes pulse{
  from{box-shadow:0 0 30px rgba(245,166,35,.3)}
  to  {box-shadow:0 0 80px rgba(245,166,35,.8)}
}
.o-icon {font-size:3rem}
.o-sym  {font-size:2.4rem;font-weight:900;color:var(--gold);margin:6px 0}
.o-dir  {font-size:1rem;color:var(--muted)}
.o-price{font-size:2.6rem;font-weight:900;margin:10px 0 4px}
.o-tgt  {font-size:.85rem;color:var(--muted);margin-bottom:22px}
.btn-ok {
  background:var(--gold);border:none;border-radius:10px;
  color:#000;font-size:.95rem;font-weight:900;
  padding:10px 36px;cursor:pointer;
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">📈 STOCK TRACKER <span style="font-size:.65rem;font-weight:400;color:#5a6478;letter-spacing:.5px;margin-left:8px">by Willie Lin</span></div>
  <div class="topbar-right">
    <div class="dot" id="conn-dot"></div>
    <span id="conn-txt">連線中...</span>
    <span id="last-ts" style="margin-left:6px">--</span>
  </div>
</div>

<div class="layout">

  <!-- LEFT -->
  <div class="left" id="left-panel"></div>

  <!-- RIGHT -->
  <div class="right">
    <div class="chart-hdr">
      <div class="ch-left">
        <div class="ch-sym"   id="ct-sym">--</div>
        <div class="ch-price" id="ct-price">--</div>
        <div class="ch-chg"   id="ct-chg">--</div>
      </div>
      <div class="period-tabs">
        <button class="ptab active" data-p="1d"  onclick="setPeriod(this)">今日</button>
        <button class="ptab"        data-p="5d"  onclick="setPeriod(this)">5日</button>
        <button class="ptab"        data-p="1mo" onclick="setPeriod(this)">1月</button>
        <button class="ptab"        data-p="3mo" onclick="setPeriod(this)">3月</button>
        <button class="ptab"        data-p="6mo" onclick="setPeriod(this)">6月</button>
        <button class="ptab"        data-p="1y"  onclick="setPeriod(this)">1年</button>
      </div>
    </div>
    <div class="chart-wrap">
      <canvas id="main-chart"></canvas>
    </div>
  </div>
</div>

<!-- Alert overlay -->
<div id="overlay">
  <div class="obox">
    <div class="o-icon" id="o-icon">🚨</div>
    <div class="o-sym"  id="o-sym">---</div>
    <div class="o-dir"  id="o-dir">---</div>
    <div class="o-price up" id="o-price">$0.00</div>
    <div class="o-tgt"  id="o-tgt">目標 $0.00</div>
    <button class="btn-ok" onclick="document.getElementById('overlay').classList.remove('show')">✅ 確認</button>
  </div>
</div>

<script>
const US_SYMS = ['VOO','VTI','QQQ'];
const TW_SYMS = ['2330.TW','0050.TW'];
const SYMS    = [...US_SYMS, ...TW_SYMS];
let quotes = {}, alerts = {}, selSym = SYMS[0], selPeriod = '1d';
let mainChart = null;
let chartBusy = false;
let pendingChartLoad = false;

const symCurrency = sym => sym.endsWith('.TW') ? 'NT$' : '$';
const symLabel    = sym => ({'2330.TW':'台積電 2330','0050.TW':'元大50 0050'}[sym] ?? sym);
const symDecimals = sym => sym.endsWith('.TW') ? 0 : 2;

// ── Build left panel (once) ───────────────────────────────────────────────────
function buildLeft() {
  const panel = document.getElementById('left-panel');

  // 美股 section header
  const usHeader = document.createElement('div');
  usHeader.style.cssText = 'font-size:.65rem;font-weight:700;color:#5a6478;letter-spacing:1px;padding:2px 4px;';
  usHeader.textContent = '🇺🇸 美股';
  panel.appendChild(usHeader);

  [...US_SYMS, ...TW_SYMS].forEach((sym, idx) => {
    // 台股 section header
    if (idx === US_SYMS.length) {
      const twHeader = document.createElement('div');
      twHeader.style.cssText = 'font-size:.65rem;font-weight:700;color:#5a6478;letter-spacing:1px;padding:6px 4px 2px;margin-top:4px;border-top:1px solid #1c2230;';
      twHeader.textContent = '🇹🇼 台股';
      panel.appendChild(twHeader);
    }

    const cur  = symCurrency(sym);
    const dec  = symDecimals(sym);
    const step = sym.endsWith('.TW') ? '1' : '0.01';
    const disp = symLabel(sym);

    const div = document.createElement('div');
    div.id = `srow-${sym}`;
    div.className = 'srow' + (sym === selSym ? ' active' : '');
    div.innerHTML = `
      <div class="srow-top" onclick="selectSym('${sym}')">
        <span class="srow-sym" style="width:auto;font-size:.9rem">${disp}</span>
        <span class="srow-price" id="price-${sym}">--</span>
        <span class="srow-chg"   id="chg-${sym}">--</span>
        <span class="mkt-tag tag-CLOSED" id="mkt-${sym}">--</span>
      </div>
      <div class="alert-chip-row">
        <div class="achip" id="chip-h-${sym}">🔺 未設定</div>
        <div class="achip" id="chip-l-${sym}">🔻 未設定</div>
      </div>
      <div class="srow-alerts">
        <div class="ai">
          <label>🔺突破</label>
          <input type="number" id="inp-h-${sym}" placeholder="高點 ${cur}" step="${step}">
        </div>
        <div class="ai">
          <label>🔻跌破</label>
          <input type="number" id="inp-l-${sym}" placeholder="低點 ${cur}" step="${step}">
        </div>
      </div>
      <div class="srow-btns">
        <button class="btn-s btn-save" onclick="saveAlert('${sym}')">💾 儲存</button>
        <button class="btn-s btn-clr"  onclick="clearAlert('${sym}')">✖ 清除</button>
      </div>`;
    panel.appendChild(div);
  });
}
buildLeft();

// ── Update only text nodes (no DOM rebuild) ───────────────────────────────────
function updatePrices(prevQuotes) {
  SYMS.forEach(sym => {
    const q = quotes[sym]; if (!q) return;
    const up  = q.change >= 0;
    const cls = up ? 'up' : 'down';
    const arrow = up ? '▲' : '▼';

    const cur = symCurrency(sym);
    const dec = symDecimals(sym);
    const priceEl = document.getElementById(`price-${sym}`);
    const chgEl   = document.getElementById(`chg-${sym}`);
    const mktEl   = document.getElementById(`mkt-${sym}`);
    if (priceEl) { priceEl.textContent = `${cur}${q.price.toFixed(dec)}`; priceEl.className = `srow-price ${cls}`; }
    if (chgEl)   { chgEl.textContent = `${arrow} ${(up?'+':'')}${q.change.toFixed(dec)} (${Math.abs(q.changePct).toFixed(2)}%)`; chgEl.className = `srow-chg ${cls}`; }
    if (mktEl)   { mktEl.textContent = mktLabel(q.marketState); mktEl.className = `mkt-tag tag-${q.marketState}`; }

    const a = alerts[sym] || {};
    const chipH = document.getElementById(`chip-h-${sym}`);
    const chipL = document.getElementById(`chip-l-${sym}`);
    if (chipH) { chipH.textContent = a.high ? `🔺 ${cur}${parseFloat(a.high).toFixed(dec)}` : '🔺 未設定'; chipH.className = `achip${a.high?' h-set':''}`; }
    if (chipL) { chipL.textContent = a.low  ? `🔻 ${cur}${parseFloat(a.low).toFixed(dec)}`  : '🔻 未設定'; chipL.className = `achip${a.low?' l-set':''}`; }
  });

  // update right-panel header if selected sym changed
  const q = quotes[selSym]; if (!q) return;
  const up = q.change >= 0;
  const cur = symCurrency(selSym);
  const dec = symDecimals(selSym);
  document.getElementById('ct-sym').textContent   = symLabel(selSym);
  document.getElementById('ct-price').textContent = `${cur}${q.price.toFixed(dec)}`;
  const ctChg = document.getElementById('ct-chg');
  ctChg.textContent = `${up?'▲':'▼'} ${(up?'+':'')}${q.change.toFixed(dec)} (${Math.abs(q.changePct).toFixed(2)}%)`;
  ctChg.className   = `ch-chg ${up?'up':'down'}`;
}

function mktLabel(s) {
  return {REGULAR:'開盤中',PRE:'盤前',POST:'盤後',CLOSED:'已收盤'}[s]??s;
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
function connect() {
  const ws = new WebSocket(`ws://${location.host}`);
  ws.onopen = () => {
    document.getElementById('conn-dot').classList.add('live');
    document.getElementById('conn-txt').textContent = '已連線';
  };
  ws.onmessage = ({ data }) => {
    try {
      const msg = JSON.parse(data);
      if (msg.type === 'update') {
        quotes = msg.quotes;
        alerts = msg.alerts || {};
        updatePrices({});
        restoreAlertInputs();
        maybeRedrawWarning();
        document.getElementById('last-ts').textContent = new Date(msg.ts).toLocaleTimeString('zh-TW');
        if (msg.triggered?.length) showOverlay(msg.triggered[0]);
      }
      if (msg.type === 'alerts') { alerts = msg.alerts || {}; updatePrices({}); restoreAlertInputs(); maybeRedrawWarning(); }
    } catch {}
  };
  ws.onclose = () => {
    document.getElementById('conn-dot').classList.remove('live');
    document.getElementById('conn-txt').textContent = '重連中...';
    setTimeout(connect, 4000);
  };
  ws.onerror = () => ws.close();
}
connect();

// ── Restore alert input values (don't overwrite if user typing) ───────────────
function restoreAlertInputs() {
  SYMS.forEach(sym => {
    const a  = alerts[sym] || {};
    const h  = document.getElementById(`inp-h-${sym}`);
    const l  = document.getElementById(`inp-l-${sym}`);
    // only restore if field is not focused
    if (h && document.activeElement !== h) h.value = a.high ?? '';
    if (l && document.activeElement !== l) l.value = a.low  ?? '';
  });
}

// ── Sym select ────────────────────────────────────────────────────────────────
function selectSym(sym) {
  selSym = sym;
  SYMS.forEach(s => {
    const el = document.getElementById(`srow-${s}`);
    if (el) el.classList.toggle('active', s === sym);
  });
  updatePrices({});
  loadMainChart();
}

// ── Alert API ─────────────────────────────────────────────────────────────────
function saveAlert(sym) {
  const h = document.getElementById(`inp-h-${sym}`)?.value.trim();
  const l = document.getElementById(`inp-l-${sym}`)?.value.trim();
  fetch('/api/alerts', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ symbol: sym, high: h||null, low: l||null }),
  });
}
function clearAlert(sym) {
  const h = document.getElementById(`inp-h-${sym}`);
  const l = document.getElementById(`inp-l-${sym}`);
  if (h) h.value = ''; if (l) l.value = '';
  fetch('/api/alerts', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ symbol: sym, high: null, low: null }),
  });
}

// ── 警戒基準線 plugin（橘色，畫在跌破低點水位）────────────────────────────────
const WARN_COLOR = '#ff9500';
const warningLinePlugin = {
  id: 'warningLine',
  afterDatasetsDraw(chart) {
    // 銷毀 / 重建過程 scales 可能還沒建立或已被拆除，先防呆避免丟例外卡住 canvas
    const yScale = chart.scales && chart.scales.y;
    if (!yScale || !chart.chartArea) return;
    const a = alerts[selSym] || {};
    const low = (a.low != null && a.low !== '') ? parseFloat(a.low) : null;
    if (low == null || isNaN(low)) return;
    const y = yScale.getPixelForValue(low);
    const { left, right, top, bottom } = chart.chartArea;
    if (y < top - 1 || y > bottom + 1) return;

    const ctx = chart.ctx;
    const cur = symCurrency(selSym);
    const dec = symDecimals(selSym);
    const label = `警戒 ${cur}${low.toFixed(dec)}`;

    ctx.save();
    // 虛線
    ctx.beginPath();
    ctx.setLineDash([6, 4]);
    ctx.moveTo(left, y);
    ctx.lineTo(right, y);
    ctx.lineWidth = 1.5;
    ctx.strokeStyle = WARN_COLOR;
    ctx.stroke();
    // 標籤
    ctx.setLineDash([]);
    ctx.font = '700 11px "Segoe UI",system-ui,sans-serif';
    const tw = ctx.measureText(label).width;
    const pad = 5;
    ctx.fillStyle = WARN_COLOR;
    ctx.fillRect(left + 4, y - 8, tw + pad * 2, 16);
    ctx.fillStyle = '#000';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, left + 4 + pad, y + 1);
    ctx.restore();
  }
};

// 記錄目前警戒線狀態，只有真正變動時才重繪圖表（含 y 軸範圍）
let lastWarnKey = '';
function maybeRedrawWarning() {
  const a = alerts[selSym] || {};
  const key = `${selSym}:${a.low ?? ''}`;
  if (key !== lastWarnKey && mainChart) loadMainChart();
}

// ── Main chart (with concurrency guard) ───────────────────────────────────────
async function loadMainChart() {
  if (chartBusy) { pendingChartLoad = true; return; }
  chartBusy = true;
  pendingChartLoad = false;
  try {
    const res  = await fetch(`/api/chart/${selSym}/${selPeriod}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (!Array.isArray(data) || !data.length) return;

    const isIntraday = selPeriod === '1d' || selPeriod === '5d';
    const labels = data.map(d => {
      const dt = new Date(d.t);
      return isIntraday
        ? dt.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'})
        : dt.toLocaleDateString('zh-TW',{month:'short',day:'numeric'});
    });
    const prices = data.map(d => d.c);
    const q   = quotes[selSym];
    const up  = q ? q.change >= 0 : (prices[prices.length-1] >= prices[0]);
    const col = up ? '#00d4aa' : '#ff4d6d';

    // 讓 y 軸範圍涵蓋警戒線，跌破水位才看得到基準線
    const a = alerts[selSym] || {};
    const lowLine = (a.low != null && a.low !== '') ? parseFloat(a.low) : null;
    let yMin;
    if (lowLine != null && !isNaN(lowLine)) {
      yMin = Math.min(Math.min(...prices), lowLine);
      yMin = yMin - (Math.max(...prices) - yMin) * 0.05; // 底部留一點空間
    }
    lastWarnKey = `${selSym}:${a.low ?? ''}`;

    // destroy old chart safely（連 canvas 上殘留的 Chart 實例一起清掉，避免 "Canvas already in use"）
    const canvas = document.getElementById('main-chart');
    const stale = mainChart || (window.Chart && Chart.getChart(canvas));
    if (stale) { try { stale.destroy(); } catch (_) {} }
    mainChart = null;

    const ctx = canvas.getContext('2d');
    const grad = ctx.createLinearGradient(0, 0, 0, canvas.offsetHeight || 400);
    grad.addColorStop(0, up ? 'rgba(0,212,170,.15)' : 'rgba(255,77,109,.15)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');

    mainChart = new Chart(canvas, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: selSym, data: prices,
          borderColor: col, borderWidth: 2,
          backgroundColor: grad, fill: true,
          pointRadius: 0, tension: 0.3,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,          // ← 關閉 animation，避免卡頓
        resizeDelay: 100,
        interaction: { intersect: false, mode: 'index' },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#1a1e2a', borderColor: '#2a3040', borderWidth: 1,
            callbacks: { label: c => ` $${c.parsed.y.toFixed(2)}` }
          },
        },
        scales: {
          x: { grid:{color:'#1a1e2a'}, ticks:{color:'#5a6478',maxTicksLimit:8,font:{size:11}} },
          y: { grid:{color:'#1a1e2a'}, ticks:{color:'#5a6478',callback:v=>'$'+v.toFixed(0),font:{size:11}}, position:'right', suggestedMin: yMin },
        },
      },
      plugins: [warningLinePlugin],
    });
  } catch (e) {
    console.error('[chart]', e.message);
  } finally {
    chartBusy = false;
    if (pendingChartLoad) loadMainChart(); // run the queued load
  }
}

function setPeriod(btn) {
  selPeriod = btn.dataset.p;
  document.querySelectorAll('.ptab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  loadMainChart();
}

// ── Alert overlay ─────────────────────────────────────────────────────────────
function showOverlay(alert) {
  const up = alert.type === 'high';
  document.getElementById('o-icon').textContent  = up ? '📈' : '📉';
  document.getElementById('o-sym').textContent   = alert.symbol;
  document.getElementById('o-dir').textContent   = up ? '已突破高點警報' : '已跌破低點警報';
  document.getElementById('o-price').textContent = `$${parseFloat(alert.price).toFixed(2)}`;
  document.getElementById('o-price').className   = `o-price ${up?'up':'down'}`;
  document.getElementById('o-tgt').textContent   = `目標價 $${parseFloat(alert.target).toFixed(2)}`;
  document.getElementById('overlay').classList.add('show');
  try {
    const ac = new AudioContext();
    [up?880:440, up?1100:330].forEach((f,i) => {
      const o=ac.createOscillator(),g=ac.createGain();
      o.connect(g);g.connect(ac.destination);
      o.frequency.value=f;o.type='square';
      g.gain.setValueAtTime(.2,ac.currentTime+i*.2);
      g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+i*.2+.18);
      o.start(ac.currentTime+i*.2);o.stop(ac.currentTime+i*.2+.2);
    });
  } catch {}
}

// ── Init ──────────────────────────────────────────────────────────────────────
// Delay initial chart load to let WebSocket data arrive first
setTimeout(loadMainChart, 1500);
</script>
