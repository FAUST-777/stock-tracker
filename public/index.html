<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stock Tracker · VOO VTI QQQ</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  :root {
    --bg: #0b0d12;
    --card: #141720;
    --border: #232733;
    --text: #e8eaf0;
    --muted: #6b7280;
    --green: #22c55e;
    --red: #ef4444;
    --gold: #f59e0b;
    --blue: #3b82f6;
    --accent: #6366f1;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }
  header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: .5px; }
  header h1 span { color: var(--accent); }
  #status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: .8rem;
    color: var(--muted);
  }
  #status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background .3s;
  }
  #status-dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); }

  /* ── Cards grid ── */
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 20px;
    margin-bottom: 28px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    cursor: pointer;
    transition: border-color .2s, transform .15s;
    position: relative;
    overflow: hidden;
  }
  .card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .card.alert-active { animation: card-flash 0.5s ease-in-out 6; }
  @keyframes card-flash {
    0%,100% { border-color: var(--border); }
    50%      { border-color: var(--gold); box-shadow: 0 0 24px var(--gold); }
  }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
  }
  .card-symbol { font-size: 1.5rem; font-weight: 800; letter-spacing: 1px; }
  .card-name { font-size: .72rem; color: var(--muted); margin-top: 2px; }
  .market-badge {
    font-size: .65rem;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 700;
    letter-spacing: .5px;
  }
  .market-badge.REGULAR  { background: #14532d; color: var(--green); }
  .market-badge.PRE      { background: #1e3a5f; color: #93c5fd; }
  .market-badge.POST     { background: #3b1c6e; color: #c4b5fd; }
  .market-badge.CLOSED   { background: #1f2937; color: var(--muted); }

  .price-row {
    display: flex;
    align-items: flex-end;
    gap: 12px;
    margin-bottom: 4px;
  }
  .price {
    font-size: 2.4rem;
    font-weight: 800;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .change {
    font-size: 1rem;
    font-weight: 700;
    padding-bottom: 4px;
  }
  .up   { color: var(--green); }
  .down { color: var(--red); }

  .meta-row {
    display: flex;
    gap: 16px;
    font-size: .72rem;
    color: var(--muted);
    margin-top: 6px;
    margin-bottom: 14px;
  }
  .meta-row span b { color: var(--text); font-weight: 600; }

  /* mini chart */
  .mini-chart { height: 64px; }

  /* alert pill */
  .alert-pill {
    display: flex;
    gap: 6px;
    margin-top: 14px;
  }
  .pill {
    flex: 1;
    background: #1a1d27;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: .72rem;
    color: var(--muted);
  }
  .pill b { display: block; font-size: .8rem; color: var(--text); margin-bottom: 2px; }
  .pill.set-high { border-color: #166534; }
  .pill.set-low  { border-color: #7f1d1d; }

  /* ── Alert settings panel ── */
  .settings {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 24px;
    margin-bottom: 28px;
  }
  .settings h2 {
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 16px;
    color: var(--gold);
  }
  .settings-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px;
  }
  .setting-row {
    background: #0f1117;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
  }
  .setting-row label {
    font-size: .85rem;
    font-weight: 700;
    margin-bottom: 10px;
    display: block;
  }
  .input-group {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
  }
  .input-group span { font-size: .75rem; color: var(--muted); width: 60px; }
  .input-group input {
    flex: 1;
    background: #1a1d27;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: .9rem;
    padding: 7px 10px;
    outline: none;
    transition: border-color .2s;
  }
  .input-group input:focus { border-color: var(--accent); }
  .input-group input.high-input:focus { border-color: var(--green); }
  .input-group input.low-input:focus  { border-color: var(--red); }
  .btn-save {
    width: 100%;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: .85rem;
    font-weight: 700;
    padding: 8px;
    cursor: pointer;
    margin-top: 4px;
    transition: opacity .2s;
  }
  .btn-save:hover { opacity: .85; }
  .btn-clear {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-size: .75rem;
    padding: 5px 10px;
    cursor: pointer;
    width: 100%;
    margin-top: 6px;
  }
  .btn-clear:hover { color: var(--red); border-color: var(--red); }

  /* ── Chart panel ── */
  .chart-panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 24px;
  }
  .chart-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .chart-header h2 { font-size: 1rem; font-weight: 700; }
  .period-tabs { display: flex; gap: 6px; }
  .tab {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-size: .75rem;
    font-weight: 700;
    padding: 5px 12px;
    cursor: pointer;
    transition: all .15s;
  }
  .tab.active, .tab:hover {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .symbol-tabs { display: flex; gap: 6px; margin-bottom: 12px; }
  .sym-tab {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-size: .85rem;
    font-weight: 800;
    padding: 6px 14px;
    cursor: pointer;
    transition: all .15s;
  }
  .sym-tab.active { background: var(--blue); border-color: var(--blue); color: #fff; }
  #main-chart { height: 280px; }

  /* ── Alert OVERLAY (全螢幕警報) ── */
  #alert-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: rgba(0,0,0,.85);
    align-items: center;
    justify-content: center;
    animation: overlay-in .2s ease;
  }
  #alert-overlay.show { display: flex; }
  @keyframes overlay-in { from { opacity: 0; } to { opacity: 1; } }
  .alert-box {
    background: #0f1117;
    border: 3px solid var(--gold);
    border-radius: 24px;
    padding: 40px 52px;
    text-align: center;
    box-shadow: 0 0 80px rgba(245,158,11,.35);
    animation: box-pulse 1s ease-in-out infinite alternate;
  }
  @keyframes box-pulse {
    from { box-shadow: 0 0 40px rgba(245,158,11,.3); }
    to   { box-shadow: 0 0 80px rgba(245,158,11,.7); }
  }
  .alert-icon-big { font-size: 3.5rem; margin-bottom: 8px; }
  .alert-sym  { font-size: 2.8rem; font-weight: 900; color: var(--gold); }
  .alert-dir  { font-size: 1.1rem; color: var(--muted); margin: 4px 0; }
  .alert-num  { font-size: 3rem; font-weight: 900; margin: 8px 0 4px 0; }
  .alert-target { font-size: .9rem; color: var(--muted); margin-bottom: 24px; }
  .btn-dismiss {
    background: var(--gold);
    border: none;
    border-radius: 12px;
    color: #000;
    font-size: 1rem;
    font-weight: 900;
    padding: 12px 36px;
    cursor: pointer;
    letter-spacing: .5px;
  }
  .btn-dismiss:hover { opacity: .85; }

  /* update flash */
  @keyframes flash-green { 0%,100%{} 50%{background:#052e16} }
  .flash-up   { animation: flash-green .4s; }
  @keyframes flash-red   { 0%,100%{} 50%{background:#450a0a} }
  .flash-down { animation: flash-red .4s; }

  #last-updated { font-size: .72rem; color: var(--muted); margin-top: 6px; }
</style>
</head>
<body>

<!-- Header -->
<header>
  <div>
    <h1>📈 <span>Stock Tracker</span></h1>
    <div id="last-updated">--</div>
  </div>
  <div id="status">
    <div id="status-dot"></div>
    <span id="status-text">連線中...</span>
  </div>
</header>

<!-- Stock Cards -->
<div class="cards" id="cards-container"></div>

<!-- Alert Settings -->
<div class="settings">
  <h2>🔔 價格警報設定</h2>
  <div class="settings-grid" id="settings-grid"></div>
</div>

<!-- Chart Panel -->
<div class="chart-panel">
  <div class="chart-header">
    <h2 id="chart-title">走勢圖</h2>
    <div class="period-tabs">
      <button class="tab active" onclick="changePeriod('1d')">今日</button>
      <button class="tab" onclick="changePeriod('5d')">5日</button>
      <button class="tab" onclick="changePeriod('1mo')">1月</button>
      <button class="tab" onclick="changePeriod('3mo')">3月</button>
    </div>
  </div>
  <div class="symbol-tabs" id="sym-tabs"></div>
  <canvas id="main-chart"></canvas>
</div>

<!-- Alert Overlay -->
<div id="alert-overlay">
  <div class="alert-box">
    <div class="alert-icon-big" id="ao-icon">🚨</div>
    <div class="alert-sym"  id="ao-sym">---</div>
    <div class="alert-dir"  id="ao-dir">---</div>
    <div class="alert-num"  id="ao-price">$0.00</div>
    <div class="alert-target" id="ao-target">目標價 $0.00</div>
    <button class="btn-dismiss" onclick="dismissAlert()">✅ 確認知道了</button>
  </div>
</div>

<script>
const SYMBOLS = ['VOO', 'VTI', 'QQQ'];
let quotes  = {};
let alerts  = {};
let mainChart = null;
let chartSym  = SYMBOLS[0];
let chartPeriod = '1d';

// ── WebSocket ────────────────────────────────────────────────────────────────
function connect() {
  const ws = new WebSocket(`ws://${location.host}`);

  ws.onopen = () => {
    document.getElementById('status-dot').classList.add('live');
    document.getElementById('status-text').textContent = '已連線';
  };

  ws.onmessage = ({ data }) => {
    const msg = JSON.parse(data);
    if (msg.type === 'update') {
      const oldQuotes = { ...quotes };
      quotes = msg.quotes;
      alerts = msg.alerts;
      renderCards(oldQuotes);
      renderSettings();
      document.getElementById('last-updated').textContent =
        '最後更新：' + new Date(msg.ts).toLocaleTimeString('zh-TW');
      if (msg.triggered?.length) showAlertOverlay(msg.triggered[0]);
    }
    if (msg.type === 'alerts') {
      alerts = msg.alerts;
      renderSettings();
    }
  };

  ws.onclose = () => {
    document.getElementById('status-dot').classList.remove('live');
    document.getElementById('status-text').textContent = '已斷線，重連中...';
    setTimeout(connect, 3000);
  };
}
connect();

// ── Render cards ──────────────────────────────────────────────────────────────
function renderCards(old) {
  const container = document.getElementById('cards-container');
  SYMBOLS.forEach(sym => {
    const q = quotes[sym];
    if (!q) return;
    const up   = q.change >= 0;
    const cls  = up ? 'up' : 'down';
    const arrow = up ? '▲' : '▼';
    const pct  = Math.abs(q.changePct).toFixed(2);
    const chg  = (up ? '+' : '') + q.change.toFixed(2);

    let el = document.getElementById(`card-${sym}`);
    if (!el) {
      el = document.createElement('div');
      el.className = 'card';
      el.id = `card-${sym}`;
      el.onclick = () => { chartSym = sym; refreshChart(); highlightSymTab(sym); };
      container.appendChild(el);
    }

    const a = alerts[sym] || {};
    el.innerHTML = `
      <div class="card-top">
        <div>
          <div class="card-symbol">${sym}</div>
          <div class="card-name">${q.name}</div>
        </div>
        <span class="market-badge ${q.marketState}">${marketLabel(q.marketState)}</span>
      </div>
      <div class="price-row">
        <div class="price ${cls}">$${q.price.toFixed(2)}</div>
        <div class="change ${cls}">${arrow} ${chg} (${pct}%)</div>
      </div>
      <div class="meta-row">
        <span>開 <b>$${q.open.toFixed(2)}</b></span>
        <span>高 <b>$${q.high.toFixed(2)}</b></span>
        <span>低 <b>$${q.low.toFixed(2)}</b></span>
        <span>昨收 <b>$${q.prevClose.toFixed(2)}</b></span>
      </div>
      <canvas class="mini-chart" id="mini-${sym}"></canvas>
      <div class="alert-pill">
        <div class="pill ${a.high ? 'set-high' : ''}">
          <b>🔺 高點警報</b>${a.high ? '$' + parseFloat(a.high).toFixed(2) : '未設定'}
        </div>
        <div class="pill ${a.low ? 'set-low' : ''}">
          <b>🔻 低點警報</b>${a.low ? '$' + parseFloat(a.low).toFixed(2) : '未設定'}
        </div>
      </div>`;

    // flash on change
    if (old[sym] && old[sym].price !== q.price) {
      el.classList.remove('flash-up', 'flash-down');
      void el.offsetWidth;
      el.classList.add(up ? 'flash-up' : 'flash-down');
    }

    drawMiniChart(sym, up);
  });
}

function marketLabel(s) {
  return { REGULAR:'開盤中', PRE:'盤前', POST:'盤後', CLOSED:'已收盤' }[s] ?? s;
}

// ── Mini sparkline ────────────────────────────────────────────────────────────
const miniData = {};
function drawMiniChart(sym, up) {
  const q = quotes[sym];
  if (!q) return;
  if (!miniData[sym]) miniData[sym] = [];
  miniData[sym].push(q.price);
  if (miniData[sym].length > 60) miniData[sym].shift();

  const canvas = document.getElementById(`mini-${sym}`);
  if (!canvas) return;

  if (canvas._chart) { canvas._chart.data.datasets[0].data = miniData[sym]; canvas._chart.update('none'); return; }

  const color = up ? '#22c55e' : '#ef4444';
  canvas._chart = new Chart(canvas, {
    type: 'line',
    data: { labels: miniData[sym].map((_,i) => i), datasets: [{
      data: miniData[sym], borderColor: color, borderWidth: 2,
      fill: true,
      backgroundColor: up ? 'rgba(34,197,94,.08)' : 'rgba(239,68,68,.08)',
      pointRadius: 0, tension: 0.4,
    }]},
    options: {
      responsive: true, maintainAspectRatio: false, animation: false,
      plugins: { legend: { display: false }, tooltip: { enabled: false } },
      scales: { x: { display: false }, y: { display: false } },
    }
  });
}

// ── Settings panel ────────────────────────────────────────────────────────────
function renderSettings() {
  const grid = document.getElementById('settings-grid');
  grid.innerHTML = SYMBOLS.map(sym => {
    const a = alerts[sym] || {};
    return `
    <div class="setting-row">
      <label>📌 ${sym}</label>
      <div class="input-group">
        <span>🔺 突破</span>
        <input type="number" class="high-input" id="inp-high-${sym}" placeholder="高點價格" step="0.01" value="${a.high ?? ''}">
      </div>
      <div class="input-group">
        <span>🔻 跌破</span>
        <input type="number" class="low-input" id="inp-low-${sym}" placeholder="低點價格" step="0.01" value="${a.low ?? ''}">
      </div>
      <button class="btn-save" onclick="saveAlert('${sym}')">💾 儲存警報</button>
      <button class="btn-clear" onclick="clearAlert('${sym}')">✖ 清除警報</button>
    </div>`;
  }).join('');
}

function saveAlert(sym) {
  const high = document.getElementById(`inp-high-${sym}`).value.trim();
  const low  = document.getElementById(`inp-low-${sym}`).value.trim();
  fetch('/api/alerts', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ symbol: sym, high: high || null, low: low || null }),
  });
}

function clearAlert(sym) {
  document.getElementById(`inp-high-${sym}`).value = '';
  document.getElementById(`inp-low-${sym}`).value  = '';
  fetch('/api/alerts', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ symbol: sym, high: null, low: null }),
  });
}

// ── Main chart ────────────────────────────────────────────────────────────────
async function refreshChart() {
  document.getElementById('chart-title').textContent = `${chartSym} 走勢圖`;
  const res  = await fetch(`/api/chart/${chartSym}/${chartPeriod}`);
  const data = await res.json();
  if (!data.length) return;

  const labels = data.map(d => {
    const dt = new Date(d.t);
    return chartPeriod === '1d' ? dt.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'})
                                 : dt.toLocaleDateString('zh-TW',{month:'short',day:'numeric'});
  });
  const prices = data.map(d => d.c);
  const up = prices[prices.length-1] >= prices[0];
  const color = up ? '#22c55e' : '#ef4444';
  const fill  = up ? 'rgba(34,197,94,.1)' : 'rgba(239,68,68,.1)';

  if (mainChart) mainChart.destroy();
  const ctx = document.getElementById('main-chart').getContext('2d');
  mainChart = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets: [{ label: chartSym, data: prices, borderColor: color,
      backgroundColor: fill, fill: true, borderWidth: 2, pointRadius: 0, tension: 0.3 }]},
    options: {
      responsive: true, maintainAspectRatio: false, animation: false,
      interaction: { intersect: false, mode: 'index' },
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ` $${ctx.parsed.y.toFixed(2)}` } },
      },
      scales: {
        x: { grid: { color: '#1f2937' }, ticks: { color: '#6b7280', maxTicksLimit: 8 } },
        y: { grid: { color: '#1f2937' }, ticks: { color: '#6b7280', callback: v => '$'+v.toFixed(0) } },
      },
    }
  });
}

function changePeriod(p) {
  chartPeriod = p;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  refreshChart();
}

function highlightSymTab(sym) {
  document.querySelectorAll('.sym-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.sym === sym);
  });
}

function buildSymTabs() {
  const div = document.getElementById('sym-tabs');
  div.innerHTML = SYMBOLS.map(s =>
    `<button class="sym-tab ${s===chartSym?'active':''}" data-sym="${s}"
      onclick="chartSym='${s}';highlightSymTab('${s}');refreshChart()">${s}</button>`
  ).join('');
}

// ── Alert overlay ─────────────────────────────────────────────────────────────
function showAlertOverlay(alert) {
  const isHigh = alert.type === 'high';
  document.getElementById('ao-icon').textContent  = isHigh ? '📈' : '📉';
  document.getElementById('ao-sym').textContent   = alert.symbol;
  document.getElementById('ao-dir').textContent   = isHigh ? '已突破高點警報' : '已跌破低點警報';
  document.getElementById('ao-price').textContent = `$${parseFloat(alert.price).toFixed(2)}`;
  document.getElementById('ao-price').className   = `alert-num ${isHigh ? 'up' : 'down'}`;
  document.getElementById('ao-target').textContent = `目標價 $${parseFloat(alert.target).toFixed(2)}`;
  document.getElementById('alert-overlay').classList.add('show');

  // 高亮對應卡片
  const card = document.getElementById(`card-${alert.symbol}`);
  if (card) { card.classList.add('alert-active'); setTimeout(()=>card.classList.remove('alert-active'), 3500); }

  // 警報音效
  playBeep(isHigh);
}

function dismissAlert() {
  document.getElementById('alert-overlay').classList.remove('show');
}

function playBeep(isHigh) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const freqs = isHigh ? [880, 1100, 880] : [440, 330, 440];
    freqs.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'square';
      gain.gain.setValueAtTime(.25, ctx.currentTime + i*.18);
      gain.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + i*.18 + .15);
      osc.start(ctx.currentTime + i*.18);
      osc.stop(ctx.currentTime + i*.18 + .16);
    });
  } catch {}
}

// ── Init ──────────────────────────────────────────────────────────────────────
buildSymTabs();
setTimeout(refreshChart, 1500);
</script>
</body>
</html>
